name: CI/CD Pipeline

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

env:
  PYTHON_VERSION: "3.11"
  POETRY_VERSION: "1.8.3"
  REGISTRY: gcr.io
  IMAGE_NAME: ${{ vars.GCP_PROJECT_ID }}/agentics-sdlc-api
  IMAGE_NAME_UI: ${{ vars.GCP_PROJECT_ID }}/agentics-sdlc-ui

permissions:
  contents: read
  actions: write
  id-token: write

jobs:
  # ============================================================
  # Job 1: Quality — lint + type check
  # ============================================================
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: pip install poetry==${{ env.POETRY_VERSION }}

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: poetry-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        run: poetry install --with dev

      - name: Run Black (format check)
        run: poetry run black --check .

      - name: Run isort (import order)
        run: poetry run isort --check-only .

      - name: Run Flake8 (lint)
        run: poetry run flake8 .

  # ============================================================
  # Job 2: Test — unit + integration
  # ============================================================
  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: quality
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: agentics_sdlc
          POSTGRES_USER: agentics_sdlc
          POSTGRES_PASSWORD: agentics_sdlc
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgresql://agentics_sdlc:agentics_sdlc@localhost:5432/agentics_sdlc
      AGENTICS_SDLC_API_KEY: test-key-for-ci
      GCP_PROJECT_ID: agentics-sdlc
      ENVIRONMENT: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Poetry
        run: pip install poetry==${{ env.POETRY_VERSION }}

      - name: Cache Poetry virtualenv
        uses: actions/cache@v4
        with:
          path: ~/.cache/pypoetry
          key: poetry-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        run: poetry install --with dev

      - name: Run unit tests
        run: poetry run pytest tests/unit/ -v --cov=src --cov-report=xml --cov-fail-under=70

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
        continue-on-error: true

  # ============================================================
  # Job 3: Build — Docker image
  # ============================================================
  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GCR
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: docker/login-action@v3
        with:
          registry: gcr.io
          username: _json_key
          password: ${{ secrets.GCP_SA_JSON }}

      - name: Build API Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: platform/docker/Dockerfile.api
          target: runtime
          push: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build UI Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: platform/docker/Dockerfile.ui
          target: runtime
          push: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_UI }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_UI }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # Job 4: Deploy — Cloud Run (main branch only)
  # ============================================================
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_JSON }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy agentics-sdlc-api \
            --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --region us-central1 \
            --platform managed \
            --memory 4Gi \
            --cpu 2 \
            --min-instances 0 \
            --max-instances 10 \
            --timeout 300 \
            --set-env-vars "GCP_PROJECT_ID=${{ vars.GCP_PROJECT_ID }},GCS_BUCKET=artifacts-${{ vars.GCP_PROJECT_ID }},BIGQUERY_DATASET=agentics_sdlc_analytics,RATE_LIMIT_RPM=60,MLFLOW_LOCAL=false,ALLOWED_ORIGINS=*" \
            --set-secrets "AGENTICS_SDLC_API_KEY=agentics-sdlc-api-key:latest,SUPABASE_URL=supabase-url:latest,SUPABASE_KEY=supabase-key:latest,SUPABASE_DB_URL=supabase-db-url:latest,QDRANT_URL=qdrant-url:latest,QDRANT_API_KEY=qdrant-api-key:latest"

      - name: Verify API deployment
        run: |
          URL=$(gcloud run services describe agentics-sdlc-api \
            --region us-central1 --format 'value(status.url)')
          echo "API deployed to: $URL"
          curl -f "$URL/health" || exit 1

      - name: Deploy UI to Cloud Run
        run: |
          gcloud run deploy agentics-sdlc-ui \
            --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_UI }}:${{ github.sha }} \
            --region us-central1 \
            --platform managed \
            --allow-unauthenticated \
            --memory 4Gi \
            --cpu 2 \
            --min-instances 1 \
            --max-instances 10 \
            --timeout 900 \
            --session-affinity \
            --set-env-vars "GCP_PROJECT_ID=${{ vars.GCP_PROJECT_ID }},ENVIRONMENT=production" \
            --set-secrets "AGENTICS_SDLC_API_KEY=agentics-sdlc-api-key:latest,SUPABASE_URL=supabase-url:latest,SUPABASE_KEY=supabase-key:latest,SUPABASE_DB_URL=supabase-db-url:latest,QDRANT_URL=qdrant-url:latest,QDRANT_API_KEY=qdrant-api-key:latest,CHAINLIT_AUTH_SECRET=chainlit-auth-secret:latest,UI_AUTH_PASSWORD_HASH=ui-auth-password-hash:latest,METRICS_USERNAME=metrics-username:latest,METRICS_PASSWORD=metrics-password:latest"

      - name: Verify UI deployment
        run: |
          UI_URL=$(gcloud run services describe agentics-sdlc-ui \
            --region us-central1 --format 'value(status.url)')
          echo "UI deployed to: $UI_URL"
          curl -f "$UI_URL/health" || exit 1
